<!DOCTYPE html>
<html lang="en">
<head>
    <title>Medical Chatbot</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.5.0/css/all.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
    <style>
        :root {
            --bg-deep: #0b0f1a;
            --bg-mid: #111827;
            --bg-card: #141c2e;
            --bg-input: #1a2236;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.25);
            --accent-2: #10b981;
            --user-bubble: linear-gradient(135deg, #3b82f6, #2563eb);
            --bot-bubble: #1e2d45;
            --text-primary: #f0f4ff;
            --text-muted: rgba(160, 180, 220, 0.6);
            --border: rgba(59, 130, 246, 0.12);
            --online: #10b981;
            --radius: 20px;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100%;
            font-family: 'DM Sans', sans-serif;
            background-color: var(--bg-deep);
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(59, 130, 246, 0.07) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(16, 185, 129, 0.05) 0%, transparent 50%);
            overflow: hidden;
        }

        /* Subtle grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .chat-wrapper {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 680px;
            height: 90vh;
            max-height: 720px;
            display: flex;
            flex-direction: column;
            background: var(--bg-card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow:
                0 0 0 1px rgba(59,130,246,0.05),
                0 20px 60px rgba(0,0,0,0.5),
                0 0 80px rgba(59,130,246,0.06);
            overflow: hidden;
        }

        /* ── Header ── */
        .chat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 24px;
            background: rgba(10, 15, 30, 0.6);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(10px);
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .avatar-wrap {
            position: relative;
        }

        .bot-avatar {
            width: 46px;
            height: 46px;
            border-radius: 14px;
            background: linear-gradient(135deg, #1d3a6e, #2a5298);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(59,130,246,0.3);
            box-shadow: 0 0 16px rgba(59,130,246,0.2);
        }

        .bot-avatar img {
            width: 28px;
            height: 28px;
            filter: brightness(0) invert(1);
            opacity: 0.9;
        }

        .status-dot {
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 12px;
            height: 12px;
            background: var(--online);
            border-radius: 50%;
            border: 2px solid var(--bg-card);
            box-shadow: 0 0 8px rgba(16, 185, 129, 0.6);
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { box-shadow: 0 0 8px rgba(16, 185, 129, 0.6); }
            50% { box-shadow: 0 0 14px rgba(16, 185, 129, 0.9); }
        }

        .bot-info .bot-name {
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: 0.3px;
        }

        .bot-info .bot-status {
            font-size: 11.5px;
            color: var(--online);
            display: flex;
            align-items: center;
            gap: 5px;
            margin-top: 1px;
        }

        .bot-info .bot-status::before {
            content: '';
            display: inline-block;
            width: 5px;
            height: 5px;
            background: var(--online);
            border-radius: 50%;
        }

        .header-badges {
            display: flex;
            gap: 8px;
        }

        .badge-pill {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 10.5px;
            font-weight: 500;
            letter-spacing: 0.4px;
            background: rgba(59,130,246,0.1);
            color: rgba(147, 197, 253, 0.8);
            border: 1px solid rgba(59,130,246,0.2);
        }

        /* ── Messages Area ── */
        .msg-body {
            flex: 1;
            overflow-y: auto;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            scroll-behavior: smooth;
        }

        .msg-body::-webkit-scrollbar {
            width: 4px;
        }

        .msg-body::-webkit-scrollbar-track {
            background: transparent;
        }

        .msg-body::-webkit-scrollbar-thumb {
            background: rgba(59,130,246,0.2);
            border-radius: 10px;
        }

        /* Day divider */
        .day-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 8px 0 16px;
        }

        .day-divider::before,
        .day-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .day-divider span {
            font-size: 10.5px;
            color: var(--text-muted);
            letter-spacing: 0.8px;
            text-transform: uppercase;
        }

        /* Message rows */
        .msg-row {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            animation: fadeSlideUp 0.3s ease forwards;
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .msg-row.sent {
            flex-direction: row-reverse;
        }

        .msg-avatar {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            flex-shrink: 0;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .msg-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .msg-avatar.bot-av {
            background: linear-gradient(135deg, #1d3a6e, #2a5298);
            display: flex;
            align-items: center;
            justify-content: center;
            border-color: rgba(59,130,246,0.25);
        }

        .msg-avatar.bot-av img {
            width: 18px;
            height: 18px;
            filter: brightness(0) invert(1);
            opacity: 0.85;
        }

        .bubble-wrap {
            display: flex;
            flex-direction: column;
            max-width: 72%;
            gap: 4px;
        }

        .msg-row.sent .bubble-wrap {
            align-items: flex-end;
        }

        .bubble {
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.6;
            color: var(--text-primary);
            position: relative;
            word-wrap: break-word;
        }

        /* Bot bubble */
        .bubble.bot {
            background: var(--bot-bubble);
            border: 1px solid rgba(59,130,246,0.15);
            border-bottom-left-radius: 6px;
        }

        /* User bubble */
        .bubble.user {
            background: var(--user-bubble);
            border-bottom-right-radius: 6px;
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.25);
        }

        .msg-time {
            font-size: 10px;
            color: var(--text-muted);
            padding: 0 4px;
        }

        /* Welcome message */
        .welcome-msg {
            text-align: center;
            padding: 20px 10px;
            margin-bottom: 10px;
        }

        .welcome-icon {
            width: 56px;
            height: 56px;
            margin: 0 auto 12px;
            background: linear-gradient(135deg, #1d3a6e, #2a5298);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(59,130,246,0.3);
            box-shadow: 0 0 24px rgba(59,130,246,0.15);
        }

        .welcome-icon img {
            width: 30px;
            filter: brightness(0) invert(1);
            opacity: 0.9;
        }

        .welcome-msg h3 {
            font-family: 'Syne', sans-serif;
            font-size: 16px;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .welcome-msg p {
            font-size: 12.5px;
            color: var(--text-muted);
            line-height: 1.6;
            max-width: 300px;
            margin: 0 auto;
        }

        .suggestion-chips {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-top: 14px;
        }

        .chip {
            padding: 6px 14px;
            background: rgba(59,130,246,0.08);
            border: 1px solid rgba(59,130,246,0.2);
            border-radius: 20px;
            font-size: 12px;
            color: rgba(147, 197, 253, 0.85);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .chip:hover {
            background: rgba(59,130,246,0.18);
            border-color: rgba(59,130,246,0.4);
            color: var(--text-primary);
        }

        /* ── Footer / Input ── */
        .chat-footer {
            padding: 16px 20px;
            background: rgba(10, 15, 30, 0.5);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }

        .input-row {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-input);
            border: 1px solid rgba(59,130,246,0.15);
            border-radius: 16px;
            padding: 8px 8px 8px 18px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-row:focus-within {
            border-color: rgba(59,130,246,0.4);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.07);
        }

        .input-row input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            line-height: 1.5;
        }

        .input-row input::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s ease;
            box-shadow: 0 4px 14px rgba(59,130,246,0.3);
        }

        .send-btn:hover {
            background: linear-gradient(135deg, #60a5fa, #3b82f6);
            box-shadow: 0 6px 20px rgba(59,130,246,0.45);
            transform: scale(1.05);
        }

        .send-btn:active {
            transform: scale(0.97);
        }

        .footer-note {
            text-align: center;
            margin-top: 10px;
            font-size: 10.5px;
            color: var(--text-muted);
            letter-spacing: 0.2px;
        }

        /* Typing indicator */
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            animation: fadeSlideUp 0.3s ease forwards;
        }

        .typing-bubbles {
            background: var(--bot-bubble);
            border: 1px solid rgba(59,130,246,0.15);
            border-radius: 18px;
            border-bottom-left-radius: 6px;
            padding: 12px 16px;
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .typing-dot {
            width: 7px;
            height: 7px;
            background: rgba(147, 197, 253, 0.4);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
            40% { transform: translateY(-6px); opacity: 1; }
        }

        @media (max-width: 600px) {
            .chat-wrapper { padding: 0; }
            .chat-container { height: 100vh; max-height: 100vh; border-radius: 0; }
            .header-badges { display: none; }
        }
    </style>
</head>

<body>
<div class="chat-wrapper">
    <div class="chat-container">

        <!-- Header -->
        <div class="chat-header">
            <div class="header-left">
                <div class="avatar-wrap">
                    <div class="bot-avatar">
                        <img src="https://cdn-icons-png.flaticon.com/512/387/387569.png" alt="bot">
                    </div>
                    <span class="status-dot"></span>
                </div>
                <div class="bot-info">
                    <div class="bot-name">Medical Chatbot</div>
                    <div class="bot-status">Online — ready to help</div>
                </div>
            </div>
            <div class="header-badges">
                <span class="badge-pill">AI Powered</span>
                <span class="badge-pill">Secure</span>
            </div>
        </div>

        <!-- Messages -->
        <div id="messageFormeight" class="msg-body">

            <div class="welcome-msg">
                <div class="welcome-icon">
                    <img src="https://cdn-icons-png.flaticon.com/512/387/387569.png" alt="bot">
                </div>
                <h3>How can I help you today?</h3>
                <p>I'm here to assist with general medical questions. Ask me anything.</p>
                <div class="suggestion-chips">
                    <span class="chip" onclick="fillInput(this)">Symptoms checker</span>
                    <span class="chip" onclick="fillInput(this)">Medication info</span>
                    <span class="chip" onclick="fillInput(this)">Healthy lifestyle tips</span>
                </div>
            </div>

            <div class="day-divider"><span>Today</span></div>

        </div>

        <!-- Footer -->
        <div class="chat-footer">
            <form id="messageArea">
                <div class="input-row">
                    <input type="text" id="text" name="msg" placeholder="Type your message…" autocomplete="off" required />
                    <button type="submit" id="send" class="send-btn">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </form>
            <div class="footer-note">Not a substitute for professional medical advice.</div>
        </div>

    </div>
</div>

<script>
    function fillInput(el) {
        $("#text").val(el.textContent).focus();
    }

    function getTime() {
        const d = new Date();
        const h = d.getHours().toString().padStart(2,'0');
        const m = d.getMinutes().toString().padStart(2,'0');
        return h + ':' + m;
    }

    function scrollBottom() {
        const body = $("#messageFormeight");
        body.scrollTop(body[0].scrollHeight);
    }

    function addTyping() {
        const html = `<div class="msg-row" id="typing-row">
            <div class="msg-avatar bot-av"><img src="https://cdn-icons-png.flaticon.com/512/387/387569.png"></div>
            <div class="typing-bubbles">
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            </div>
        </div>`;
        $("#messageFormeight").append(html);
        scrollBottom();
    }

    $(document).ready(function() {
        $("#messageArea").on("submit", function(event) {
            event.preventDefault();
            const rawText = $("#text").val().trim();
            if (!rawText) return;

            const time = getTime();

            const userHtml = `<div class="msg-row sent">
                <div class="msg-avatar"><img src="https://i.ibb.co/d5b84Xw/Untitled-design.png"></div>
                <div class="bubble-wrap">
                    <div class="bubble user">${rawText}</div>
                    <span class="msg-time">${time}</span>
                </div>
            </div>`;

            $("#text").val("");
            $("#messageFormeight").append(userHtml);
            scrollBottom();

            addTyping();

            $.ajax({
                data: { msg: rawText },
                type: "POST",
                url: "/get",
            }).done(function(data) {
                $("#typing-row").remove();
                const botHtml = `<div class="msg-row">
                    <div class="msg-avatar bot-av"><img src="https://cdn-icons-png.flaticon.com/512/387/387569.png"></div>
                    <div class="bubble-wrap">
                        <div class="bubble bot">${data}</div>
                        <span class="msg-time">${time}</span>
                    </div>
                </div>`;
                $("#messageFormeight").append($.parseHTML(botHtml));
                scrollBottom();
            }).fail(function() {
                $("#typing-row").remove();
            });
        });
    });
</script>
</body>
</html>
